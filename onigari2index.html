<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>鬼狩りスタンプ</title>
  <style>
    :root {
      --pink: #ff85b2;
      --light: #fff4f8;
      --line: #f4c9d8;
      --brown: #583243;
      --soft: #fffafa;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, #fff7fb 0%, #fff0f6 100%);
      color: var(--brown);
      padding: 22px 16px 40px;
    }
    .app {
      max-width: 520px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      font-size: 34px;
      margin: 18px 0 6px;
      letter-spacing: .03em;
    }
    .lead {
      text-align: center;
      color: #8d6676;
      font-weight: 700;
      line-height: 1.6;
      margin: 0 0 24px;
    }
    .card {
      background: rgba(255,255,255,.88);
      border: 3px solid var(--line);
      border-radius: 28px;
      padding: 22px;
      margin: 18px 0;
      box-shadow: 0 10px 30px rgba(255,133,178,.08);
    }
    .label {
      font-size: 15px;
      font-weight: 800;
      color: #9a6a7d;
      margin-bottom: 12px;
    }
    .target {
      text-align: center;
      font-size: 46px;
      font-weight: 900;
      margin: 6px 0 8px;
    }
    .dice {
      text-align: center;
      font-size: 48px;
      margin: 8px 0 16px;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    button {
      border: none;
      border-radius: 20px;
      padding: 18px 12px;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      color: white;
      background: var(--pink);
      box-shadow: 0 8px 18px rgba(255,133,178,.20);
    }
    button.secondary {
      color: var(--brown);
      background: white;
      border: 3px solid var(--line);
      box-shadow: none;
    }
    .progress {
      text-align: center;
      font-size: 40px;
      font-weight: 900;
      margin: 4px 0 18px;
    }
    .stamps {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-top: 16px;
    }
    .stamp {
      aspect-ratio: 1 / .82;
      border-radius: 16px;
      border: 3px dashed #f5c8d7;
      display: grid;
      place-items: center;
      background: #fff6fa;
      font-size: 28px;
      min-height: 58px;
    }
    .empty {
      font-size: 20px;
      color: var(--brown);
    }
    input {
      width: 100%;
      border: 3px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      font-size: 18px;
      background: white;
      color: var(--brown);
    }
    .mini-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .hint {
      font-size: 14px;
      color: #9a6a7d;
      margin-top: 10px;
      line-height: 1.5;
    }
    .history {
      text-align: center;
      color: #9a6a7d;
      line-height: 1.8;
      min-height: 34px;
    }
    .footer {
      text-align: center;
      color: #9a6a7d;
      font-size: 13px;
      margin-top: 18px;
      line-height: 1.6;
    }
    @media (max-width: 380px) {
      h1 { font-size: 30px; }
      .row, .mini-grid { grid-template-columns: 1fr; }
      .stamps { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>🍑 鬼狩りスタンプ</h1>
    <p class="lead">鬼を狩ったら桃スタンプをぽん。<br>今日の目標はサイコロで決める。</p>

    <section class="card">
      <div class="label">今日の鬼狩り目標</div>
      <div class="target" id="target">-</div>
      <div class="dice" id="dice">🎲</div>
      <div class="row">
        <button onclick="rollDice()">サイコロを振る</button>
        <button class="secondary" onclick="resetToday()">今日をリセット</button>
      </div>
    </section>

    <section class="card">
      <div class="label">今日の進み具合</div>
      <div class="progress"><span id="count">0</span> / <span id="targetSmall">0</span></div>
      <div class="row">
        <button onclick="addStamp()">🍑 桃スタンプを押す</button>
        <button class="secondary" onclick="removeStamp()">1つ戻す</button>
      </div>
      <div class="stamps" id="stamps"></div>
    </section>

    <section class="card">
      <div class="label">ご褒美設定</div>
      <div class="mini-grid">
        <div>
          <div class="label">何個たまったら</div>
          <input id="rewardCount" type="number" min="1" value="5" />
        </div>
        <div>
          <div class="label">ご褒美</div>
          <input id="rewardText" type="text" value="ハーブティータイム☕" />
        </div>
      </div>
      <div class="hint">例：5個で温泉、7個で好きなおやつ、10個でピラティス後カフェ など</div>
    </section>

    <section class="card">
      <div class="label">履歴</div>
      <div class="history" id="history">まだ履歴はないよ</div>
      <button class="secondary" onclick="clearHistory()" style="width:100%; margin-top:14px;">履歴を消す</button>
    </section>

    <div class="footer">この開き方で保存できない場合があります。でも、その場ではちゃんと動きます。</div>
  </main>

  <script>
    let target = Number(localStorage.getItem("onigari_target") || 0);
    let count = Number(localStorage.getItem("onigari_count") || 0);
    let history = JSON.parse(localStorage.getItem("onigari_history") || "[]");

    function save() {
      try {
        localStorage.setItem("onigari_target", target);
        localStorage.setItem("onigari_count", count);
        localStorage.setItem("onigari_history", JSON.stringify(history));
      } catch(e) {}
    }

    function render() {
      document.getElementById("target").textContent = target || "-";
      document.getElementById("targetSmall").textContent = target || 0;
      document.getElementById("count").textContent = count;

      const stamps = document.getElementById("stamps");
      stamps.innerHTML = "";
      const total = Math.max(target || 6, count, 6);
      for (let i = 0; i < total; i++) {
        const div = document.createElement("div");
        div.className = "stamp";
        div.textContent = i < count ? "🍑" : "・";
        if (i >= count) div.classList.add("empty");
        stamps.appendChild(div);
      }

      const hist = document.getElementById("history");
      hist.innerHTML = history.length ? history.slice(-5).reverse().join("<br>") : "まだ履歴はないよ";
    }

    function rollDice() {
      target = Math.floor(Math.random() * 6) + 1;
      count = 0;
      document.getElementById("dice").textContent = ["⚀","⚁","⚂","⚃","⚄","⚅"][target-1];
      save();
      render();
    }

    function addStamp() {
      count++;
      const rewardCount = Number(document.getElementById("rewardCount").value || 5);
      const rewardText = document.getElementById("rewardText").value || "ご褒美";
      if (rewardCount > 0 && count % rewardCount === 0) {
        alert("🍑 ご褒美タイム！\\n" + rewardText);
      }
      if (target && count >= target) {
        const today = new Date().toLocaleDateString("ja-JP");
        history.push(today + "：鬼狩り達成 🍑 " + count + "個");
      }
      save();
      render();
    }

    function removeStamp() {
      if (count > 0) count--;
      save();
      render();
    }

    function resetToday() {
      count = 0;
      target = 0;
      document.getElementById("dice").textContent = "🎲";
      save();
      render();
    }

    function clearHistory() {
      history = [];
      save();
      render();
    }

    render();
  </script>
</body>
</html>
