<!doctype html><html lang='ja'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>鬼狩りスタンプ</title><style>body{font-family:-apple-system,sans-serif;text-align:center;padding:20px;background:#fff5f8}button{font-size:20px;padding:12px 18px;margin:8px;border-radius:14px}#peaches{font-size:32px;word-break:break-all}</style></head><body><h1>🍑鬼狩りスタンプ</h1><p>今日の鬼狩り目標: <span id='target'>-</span></p><button onclick='roll()'>🎲 サイコロを振る</button><button onclick='stamp()'>🍑 桃スタンプを押す</button><p>達成数: <span id='count'>0</span></p><div id='peaches'></div><script>let count=0;function roll(){document.getElementById('target').textContent=Math.floor(Math.random()*6)+1;}function stamp(){count++;document.getElementById('count').textContent=count;document.getElementById('peaches').textContent+='🍑';if(count%5===0) alert('ご褒美タイム✨');}</script></body></html>
